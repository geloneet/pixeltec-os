# ==================================================================
# PixelTEC OS (CRM) — docker-compose.yml
# ==================================================================
# Este compose gestiona la app Next.js del CRM + su base de datos Postgres
# (migración en curso hacia Postgres+Drizzle+NextAuth — ver
# docs/superpowers/plans/2026-07-07-firebase-to-postgres-drizzle-nextauth-migration.md).
# Nginx y Certbot viven en pixeltec-infra/docker-compose.yml.
#
# `app` habla con nginx/otros containers por `web-network` (external) y con
# `db` por la red interna dedicada `pixeltec-os-internal` (NO expuesta a
# web-network — ningún otro container del VPS puede alcanzar la DB).
#
# Operaciones:
#   - Rebuild + deploy:  docker compose build --no-cache app && docker compose up -d app
#   - Logs:              docker compose logs -f app
#   - Restart:           docker compose restart app
#   - Migraciones:       docker compose --profile tools run --rm migrator
#   - Seed inicial:      docker compose --profile tools run --rm seed
# ==================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
    container_name: pixeltec-os
    restart: unless-stopped
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - web-network
      - pixeltec-os-internal

  db:
    container_name: pixeltec-os-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pixeltec_os
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pixeltec_os
    volumes:
      - pixeltec-os-db-data:/var/lib/postgresql/data
    # Solo 127.0.0.1 (regla de seguridad de puertos del VPS, ver
    # pixeltec-infra/runbooks/docker-port-hardening.md): permite que
    # `npm run dev` en el host (dev.pixeltec.mx) alcance la DB sin exponerla
    # a la red pública — Docker bypasea ufw vía PREROUTING DNAT si el bind
    # fuera 0.0.0.0.
    ports:
      - "127.0.0.1:5437:5432"
    networks:
      - pixeltec-os-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixeltec_os"]
      interval: 5s
      timeout: 5s
      retries: 10

  # qa-runner: servicio Playwright de QA de navegador de PixelForge (F8-T6).
  # Corre SIEMPRE que `app` corre (NO es un profile "tools" — Miguel
  # re-ejecuta QA desde la estación sin pasos manuales). Red SOLO interna:
  # alcanza `db` y `app:3000`, sin puertos publicados, sin `web-network`
  # (el allowlist de egress del propio runner es defensa en profundidad —
  # esto es la primera capa: ni siquiera puede alcanzar el resto del VPS).
  # Hardening (cierre F8): esto es infraestructura de ejecución sensible — un
  # navegador automatizado procesando páginas generadas por IA. Capas:
  # usuario no-root (pwuser, el de la imagen oficial de Playwright), rootfs
  # de solo lectura (Chromium escribe únicamente en los tmpfs de /tmp y
  # /home/pwuser; screenshots van a R2 desde memoria), cero capabilities
  # (chromium corre --no-sandbox, no necesita ninguna), sin escalada de
  # privilegios, límites de memoria/CPU/procesos, e init para cosechar los
  # procesos hijos del browser-por-job. El healthcheck valida FRESCURA del
  # heartbeat que el loop toca en cada poll (scripts/qa-runner/heartbeat.ts)
  # — detecta loop colgado, no solo proceso vivo; umbral 360s > JOB_TIMEOUT
  # de 4 min (durante un job legítimo el loop no itera).
  qa-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: qa-runner
    container_name: pixeltec-os-qa-runner
    restart: unless-stopped
    init: true
    user: pwuser
    read_only: true
    tmpfs:
      - /tmp:size=512m
      - /home/pwuser:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: 1.5
    pids_limit: 512
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/qa-runner-heartbeat && [ $$(($$(date +%s) - $$(date -r /tmp/qa-runner-heartbeat +%s))) -lt 360 ]"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pixeltec-os-internal

  # ── Tools (bajo demanda: docker compose --profile tools run --rm <servicio>) ──
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    command: ["npx", "drizzle-kit", "migrate"]
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pixeltec-os-internal
    profiles:
      - tools

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    command: ["npx", "tsx", "scripts/seed.ts"]
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pixeltec-os-internal
    profiles:
      - tools

networks:
  web-network:
    external: true
  pixeltec-os-internal:
    driver: bridge

volumes:
  pixeltec-os-db-data:
