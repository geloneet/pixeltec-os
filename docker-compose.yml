# ==================================================================
# PixelTEC OS (CRM) — docker-compose.yml
# ==================================================================
# Este compose gestiona SOLO la app Next.js del CRM.
# Nginx y Certbot viven en pixeltec-infra/docker-compose.yml.
#
# Ambos composes se comunican por la red `web-network` (external).
#
# Operaciones:
#   - Rebuild + deploy:  docker compose build --no-cache app && docker compose up -d app
#   - Logs:              docker compose logs -f app
#   - Restart:           docker compose restart app
# ==================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
    container_name: pixeltec-os
    restart: unless-stopped
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - web-network

networks:
  web-network:
    external: true
