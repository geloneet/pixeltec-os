name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /home/ubuntu/pixeltec-os
            echo "==> git pull"
            git pull origin main
            echo "==> docker compose build"
            docker compose --env-file .env.production build
            echo "==> docker compose up"
            docker compose --env-file .env.production up -d
            echo "==> nginx reload (el contenedor recreado puede tomar otra IP en web-network; sin reload nginx sigue apuntando a la vieja -> 502/504)"
            docker exec pixeltec-nginx nginx -s reload || true
            echo "==> limpiar build cache/imagenes huerfanas (evita que el cache se acumule entre deploys y llene el disco; el prune semanal solo corre domingos)"
            docker builder prune -f > /dev/null 2>&1 || true
            docker image prune -f > /dev/null 2>&1 || true
            echo "==> Health check"
            sleep 5
            # Host explícito: nginx tiene un default_server que descarta (444) cualquier
            # request cuyo Host no matchee un server_name configurado (hardening — ver
            # pixeltec-infra/nginx/conf.d/00-default.conf), así que "http://localhost" a
            # secas siempre da "Empty reply from server" y tumbaba este step aunque el
            # deploy hubiera salido bien. Pegarle con el Host real también valida que
            # nginx esté enrutando al contenedor nuevo, no solo que el contenedor viva.
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -H "Host: pixeltec.mx" http://localhost)
            echo "HTTP $CODE"
            if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 400 ]; then
              echo "Health check falló (HTTP $CODE)"
              exit 1
            fi
          ENDSSH
